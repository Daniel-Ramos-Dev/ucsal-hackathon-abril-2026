<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecoelytix · Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">🌿</div>
      <span class="login-logo-text">Ecoelytix</span>
    </div>

    <h2>Bem-vindo</h2>
    <p class="login-subtitle">Acesse o painel de monitoramento ambiental.</p>

    <form action="dashboard.html" method="GET">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" placeholder="seu.usuario">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" placeholder="••••••••">
      </div>
      <button type="submit">Entrar</button>
    </form>

    <p class="login-footer">Ecolytix · Monitoramento Ambiental</p>
  </div>
</div>

</body>
</html>
